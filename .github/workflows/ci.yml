name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python package and dev tools
        working-directory: python/orchestrator
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint Python
        working-directory: python/orchestrator
        run: ruff check src tests
      - name: Run Python tests
        working-directory: python/orchestrator
        run: python -m unittest discover -s tests -v
      - name: Smoke source install
        working-directory: python/orchestrator
        run: pathflow-guard doctor

  windows-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build and smoke test Windows executable
        shell: pwsh
        working-directory: python/orchestrator
        run: .\build_windows.ps1 -SmokeTest
      - name: Upload Windows executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: pathflowguard-windows-exe
          path: python/orchestrator/dist/PathFlowGuard.exe

  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure C++
        run: cmake -S cpp/qc-core -B build/cpp
      - name: Build C++
        run: cmake --build build/cpp --config Release
      - name: Test C++
        run: ctest --test-dir build/cpp --build-config Release --output-on-failure

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --manifest-path rust/attestor/Cargo.toml --check
      - name: Clippy
        run: cargo clippy --manifest-path rust/attestor/Cargo.toml -- -D warnings
      - name: Test Rust
        run: cargo test --manifest-path rust/attestor/Cargo.toml
